      <div class="hsn-footer">
        <span class="gst-badge ${gstClass(h.gst)}">GST ${h.gst}%</span>
        <span class="copy-code" onclick="copy('${h.code}',this)">📋 Copy Code</span>
      </div>
    </div>
  `).join('');
}

function search(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  if(!q){render(HSN);return}
  const res=HSN.filter(h=>h.name.toLowerCase().includes(q)||h.desc.toLowerCase().includes(q)||h.code.includes(q));
  render(res);
}

function copy(code,el){
  navigator.clipboard.writeText(code).then(()=>{const o=el.textContent;el.textContent='✅ Copied!';setTimeout(()=>el.textContent=o,2000)});
}

render(HSN);
</script>
</body></html>
