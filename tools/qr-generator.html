<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QR Code Generator – Tradesala Vendor Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--red:#f41212;--red2:#ff4444;--red-glow:rgba(244,18,18,0.35);--red-soft:rgba(244,18,18,0.12);--glass-bg:rgba(255,255,255,0.055);--glass-border:rgba(255,255,255,0.13);--text:rgba(255,255,255,0.95);--text-2:rgba(255,255,255,0.55);--text-3:rgba(255,255,255,0.28);--bg:#07070f}
html{scroll-behavior:smooth}body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.bg-scene{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:float 22s ease-in-out infinite}
.orb-1{width:500px;height:500px;top:-180px;right:-120px;background:radial-gradient(circle,rgba(244,18,18,0.20) 0%,transparent 70%);animation-duration:25s}
.orb-2{width:400px;height:400px;bottom:-120px;left:-80px;background:radial-gradient(circle,rgba(180,10,10,0.15) 0%,transparent 70%);animation-duration:30s;animation-delay:-12s}
.grid-overlay{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%)}
@keyframes float{0%,100%{transform:translate(0,0)}33%{transform:translate(28px,-38px)}66%{transform:translate(-18px,28px)}}
.page{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:0 24px 100px}
nav{position:sticky;top:0;z-index:100;margin:0 -24px;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(7,7,15,0.75);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-bottom:1px solid var(--glass-border);animation:slideDown 0.5s cubic-bezier(0.16,1,0.3,1) both}
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}.logo-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--red),#a00);display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-weight:900;font-size:17px;color:white;box-shadow:0 0 18px var(--red-glow);position:relative;overflow:hidden}.logo-mark::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.25) 0%,transparent 60%)}.logo-text{font-family:'Outfit',sans-serif;font-weight:700;font-size:16px}.logo-text span{color:var(--text-2);font-weight:400}
.back-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:100px;border:1px solid var(--glass-border);background:var(--glass-bg);font-size:13px;color:var(--text-2);text-decoration:none;transition:all 0.2s}.back-btn:hover{border-color:rgba(244,18,18,0.4);color:var(--text);background:var(--red-soft)}
.tool-header{padding:56px 0 40px;animation:fadeUp 0.6s 0.15s cubic-bezier(0.16,1,0.3,1) both}
.breadcrumb{font-size:12px;color:var(--text-3);margin-bottom:16px}.breadcrumb a{color:var(--text-3);text-decoration:none}.breadcrumb a:hover{color:var(--red2)}
h1{font-family:'Outfit',sans-serif;font-size:clamp(32px,5vw,52px);font-weight:800;letter-spacing:-2px;line-height:1.05;margin-bottom:12px}
h1 span{background:linear-gradient(90deg,var(--red),#ff6060);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tool-header p{font-size:16px;color:var(--text-2);font-weight:300;line-height:1.7}
.panel{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:24px;backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);padding:32px;margin-bottom:16px;position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent)}
.panel.a1{animation:fadeUp 0.6s 0.25s cubic-bezier(0.16,1,0.3,1) both}.panel.a2{animation:fadeUp 0.6s 0.35s cubic-bezier(0.16,1,0.3,1) both}
.panel-title{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-3);margin-bottom:24px;display:flex;align-items:center;gap:8px}.panel-title::after{content:'';flex:1;height:1px;background:var(--glass-border)}
.fg{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}.fg label{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-3)}
input[type=text],input[type=url],select,textarea{width:100%;padding:13px 16px;background:rgba(0,0,0,0.25);border:1px solid var(--glass-border);border-radius:14px;color:var(--text);font-family:'Figtree',sans-serif;font-size:15px;outline:none;transition:all 0.25s}
input:focus,select:focus,textarea:focus{border-color:rgba(244,18,18,0.5);background:rgba(244,18,18,0.06);box-shadow:0 0 0 3px rgba(244,18,18,0.08)}
input::placeholder,textarea::placeholder{color:var(--text-3)}
select option{background:#1a1a2e}
textarea{resize:vertical;min-height:80px}
.tabs{display:flex;gap:4px;background:rgba(0,0,0,0.3);border-radius:14px;padding:4px;margin-bottom:24px;border:1px solid var(--glass-border);flex-wrap:wrap}
.tab{flex:1;min-width:80px;padding:10px;border:none;border-radius:11px;background:transparent;font-family:'Figtree',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.25s;color:var(--text-2);text-align:center}
.tab.active{background:rgba(244,18,18,0.18);color:rgba(255,110,110,0.95);border:1px solid rgba(244,18,18,0.3)}
.btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--red),#c40e0e);border:none;border-radius:14px;font-family:'Outfit',sans-serif;font-size:17px;font-weight:700;color:white;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;box-shadow:0 8px 30px rgba(244,18,18,0.35)}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.18) 0%,transparent 50%)}.btn:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(244,18,18,0.45)}.btn:active{transform:translateY(0)}
#qr-output{display:none}#qr-output.show{display:block}
.qr-result{display:flex;flex-direction:column;align-items:center;gap:20px}
#qrcode{background:white;padding:20px;border-radius:16px;display:inline-block;box-shadow:0 0 40px rgba(244,18,18,0.15)}
#qrcode img,#qrcode canvas{display:block}
.dl-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:rgba(22,200,90,0.10);border:1px solid rgba(22,200,90,0.22);border-radius:12px;color:rgba(80,220,120,0.9);font-family:'Figtree',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;text-decoration:none}.dl-btn:hover{background:rgba(22,200,90,0.18)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes rIn{from{opacity:0;transform:scale(0.97) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
#qr-output.show{animation:rIn 0.4s cubic-bezier(0.16,1,0.3,1) both}
@media(max-width:600px){.page{padding:0 16px 80px}nav{margin:0 -16px;padding:0 16px}}
</style>
</head>
<body>
<div class="bg-scene" aria-hidden="true"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="grid-overlay"></div></div>
<div class="page">
  <nav>
    <div class="logo"><div class="logo-mark">T</div><div class="logo-text">Vendor Tools <span>by Tradesala</span></div></div>
    <a href="../index.html" class="back-btn">← All Tools</a>
  </nav>
  <div class="tool-header">
    <div class="breadcrumb"><a href="../index.html">Vendor Tools</a> / QR Code Generator</div>
    <h1>QR Code <span>Generator</span></h1>
    <p>Generate QR codes for your product pages, UPI payments, WhatsApp links, or any URL. Free, instant, downloadable.</p>
  </div>
  <div class="panel a1">
    <div class="panel-title">Choose Type</div>
    <div class="tabs">
      <button class="tab active" onclick="setType('url',this)">🔗 URL / Link</button>
      <button class="tab" onclick="setType('upi',this)">💳 UPI Payment</button>
      <button class="tab" onclick="setType('whatsapp',this)">💬 WhatsApp</button>
      <button class="tab" onclick="setType('text',this)">📝 Plain Text</button>
    </div>
    <div id="form-url">
      <div class="fg"><label>Website / Product URL</label><input type="url" id="inp-url" placeholder="https://tradesala.com/your-product"/></div>
    </div>
    <div id="form-upi" style="display:none">
      <div class="fg"><label>UPI ID</label><input type="text" id="inp-upi-id" placeholder="yourname@upi"/></div>
      <div class="fg"><label>Payee Name</label><input type="text" id="inp-upi-name" placeholder="Your Shop Name"/></div>
      <div class="fg"><label>Amount (₹) — optional</label><input type="text" id="inp-upi-amt" placeholder="Leave blank for any amount"/></div>
    </div>
    <div id="form-whatsapp" style="display:none">
      <div class="fg"><label>Mobile Number (with country code)</label><input type="text" id="inp-wa" placeholder="+919876543210"/></div>
      <div class="fg"><label>Pre-filled Message — optional</label><textarea id="inp-wa-msg" placeholder="Hi! I'm interested in your product…"></textarea></div>
    </div>
    <div id="form-text" style="display:none">
      <div class="fg"><label>Text Content</label><textarea id="inp-text" placeholder="Enter any text, product code, or information…" style="min-height:120px"></textarea></div>
    </div>
    <div class="fg" style="margin-top:8px"><label>QR Code Size</label>
      <select id="qr-size"><option value="200">Small (200×200)</option><option value="256" selected>Medium (256×256)</option><option value="320">Large (320×320)</option></select>
    </div>
    <button class="btn" onclick="generate()" style="margin-top:8px">Generate QR Code →</button>
  </div>
  <div class="panel a2" id="qr-output">
    <div class="panel-title">Your QR Code</div>
    <div class="qr-result">
      <div id="qrcode"></div>
      <button class="dl-btn" onclick="download()">⬇️ Download PNG</button>
    </div>
  </div>
</div>
<script>
let qrType='url';
function setType(t,btn){
  qrType=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['url','upi','whatsapp','text'].forEach(f=>document.getElementById('form-'+f).style.display=f===t?'block':'none');
}
function getData(){
  if(qrType==='url') return document.getElementById('inp-url').value.trim();
  if(qrType==='text') return document.getElementById('inp-text').value.trim();
  if(qrType==='whatsapp'){
    const num=document.getElementById('inp-wa').value.trim().replace(/\D/g,'');
    const msg=encodeURIComponent(document.getElementById('inp-wa-msg').value.trim());
    return `https://wa.me/${num}${msg?'?text='+msg:''}`;
  }
  if(qrType==='upi'){
    const id=document.getElementById('inp-upi-id').value.trim();
    const name=encodeURIComponent(document.getElementById('inp-upi-name').value.trim());
    const amt=document.getElementById('inp-upi-amt').value.trim();
    return `upi://pay?pa=${id}&pn=${name}${amt?'&am='+amt:''}`;
  }
  return '';
}
function generate(){
  const data=getData();
  if(!data){alert('Please fill in the required field.');return}
  const size=+document.getElementById('qr-size').value;
  const container=document.getElementById('qrcode');
  container.innerHTML='';
  new QRCode(container,{text:data,width:size,height:size,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
  const out=document.getElementById('qr-output');
  out.classList.remove('show');void out.offsetWidth;out.classList.add('show');
  setTimeout(()=>out.scrollIntoView({behavior:'smooth',block:'center'}),100);
}
function download(){
  const canvas=document.querySelector('#qrcode canvas');
  if(!canvas){alert('Generate a QR code first.');return}
  const a=document.createElement('a');
  a.download='tradesala-qr.png';
  a.href=canvas.toDataURL('image/png');
  a.click();
}
</script>
</body></html>
